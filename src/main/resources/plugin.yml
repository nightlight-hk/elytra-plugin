name: elytra-plugin
version: '1.0-SNAPSHOT'
main: org.nightcat.elytraPlugin.ElytraPlugin
api-version: '1.21'
folia-supported: true
commands: {
    elytradroprate: {
        description: "Sets the Ender Dragon elytra drop rate.",
        usage: "/elytradroprate <0.0-1.0>",
        permission: "elytra-plugin.elytradroprate"
    }
}
permissions: {
    elytra-plugin.elytradroprate: {
        description: "Allows changing the elytra drop rate.",
        default: op
    }
}
